<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merwan T Djerbi — Agentic AI Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;--bg4:#22223a;
  --accent:#B07FE0;--blue:#00b8ff;--violet:#7b61ff;
  --text:#e8e6f0;--text2:#9a97b0;--text3:#6a6780;
  --radius:14px;--radius-sm:10px;
}
html{font-size:16px}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}
code,pre,.mono{font-family:'JetBrains Mono',monospace}

/* ── LAYOUT ── */
.app{display:flex;width:100%;height:100vh}
.chat-panel{width:40%;min-width:340px;display:flex;flex-direction:column;border-right:1px solid rgba(176,127,224,.12);background:var(--bg);position:relative;z-index:2}
.canvas-panel{width:60%;display:flex;flex-direction:column;background:var(--bg2);overflow:hidden;position:relative}

/* ── CHAT HEADER ── */
.chat-header{padding:20px 24px;border-bottom:1px solid rgba(176,127,224,.08);display:flex;align-items:center;gap:14px;flex-shrink:0}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--violet));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;letter-spacing:1px;color:#fff;flex-shrink:0}
.header-info h2{font-size:15px;font-weight:600}
.header-info p{font-size:12px;color:var(--text2);margin-top:2px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#34d399;display:inline-block;margin-right:6px;animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:rgba(176,127,224,.18);border-radius:10px}
.msg-row{display:flex;gap:10px;max-width:92%;animation:msg-in .35s cubic-bezier(.22,1,.36,1)}
.msg-row.ai{align-self:flex-start}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--violet));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-top:4px}
.msg-row.user .msg-avatar{background:linear-gradient(135deg,var(--blue),var(--violet))}
.msg-bubble{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.65;max-width:100%}
.msg-row.ai .msg-bubble{background:var(--bg3);border-bottom-left-radius:4px;color:var(--text)}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,var(--accent),var(--violet));border-bottom-right-radius:4px;color:#fff}
.msg-bubble a{color:var(--blue);text-decoration:none}
.msg-bubble a:hover{text-decoration:underline}
@keyframes msg-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── TYPING INDICATOR ── */
.typing-row{display:flex;gap:10px;align-self:flex-start;max-width:92%}
.typing-dots{display:flex;gap:5px;padding:14px 18px;background:var(--bg3);border-radius:18px;border-bottom-left-radius:4px;align-items:center}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:bounce-dot 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce-dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* ── QUICK REPLIES ── */
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 2px;max-width:92%;align-self:flex-start;margin-left:40px}
.quick-btn{padding:7px 16px;border-radius:20px;border:1px solid rgba(176,127,224,.25);background:rgba(176,127,224,.06);color:var(--accent);font-size:12.5px;font-family:'Sora',sans-serif;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.quick-btn:hover{background:rgba(176,127,224,.15);border-color:var(--accent);transform:translateY(-1px)}

/* ── INPUT ── */
.chat-input{padding:14px 18px;border-top:1px solid rgba(176,127,224,.08);display:flex;gap:10px;flex-shrink:0;background:var(--bg)}
.chat-input input{flex:1;background:var(--bg3);border:1px solid rgba(176,127,224,.12);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'Sora',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s}
.chat-input input:focus{border-color:var(--accent)}
.chat-input input::placeholder{color:var(--text3)}
.send-btn{width:44px;height:44px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s}
.send-btn:hover{transform:scale(1.05)}
.send-btn:active{transform:scale(.95)}

/* ── CANVAS ── */
.canvas-header{padding:18px 28px;border-bottom:1px solid rgba(176,127,224,.06);flex-shrink:0;display:flex;align-items:center;gap:12px}
.canvas-header h3{font-size:14px;font-weight:500;color:var(--text2)}
.canvas-body{flex:1;overflow-y:auto;padding:28px;position:relative}
.canvas-body::-webkit-scrollbar{width:5px}
.canvas-body::-webkit-scrollbar-thumb{background:rgba(176,127,224,.15);border-radius:10px}

.canvas-view{display:none;animation:canvas-in .45s cubic-bezier(.22,1,.36,1)}
.canvas-view.active{display:block}
@keyframes canvas-in{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── WELCOME CANVAS ── */
.welcome-canvas{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:16px}
.welcome-canvas .big-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--violet));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff}
.welcome-canvas h2{font-size:22px;font-weight:600}
.welcome-canvas p{color:var(--text2);font-size:14px;max-width:380px;line-height:1.7}
.welcome-canvas .hint{font-size:12px;color:var(--text3);margin-top:8px}

/* ── PROJECT GRID ── */
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.project-card{background:var(--bg3);border:1px solid rgba(176,127,224,.08);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.project-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 30px rgba(176,127,224,.1)}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--violet));opacity:0;transition:opacity .25s}
.project-card:hover::before{opacity:1}
.project-icon{width:40px;height:40px;border-radius:10px;background:rgba(176,127,224,.1);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.project-card h4{font-size:14px;font-weight:600;margin-bottom:6px}
.project-card p{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.project-tags{display:flex;flex-wrap:wrap;gap:5px}
.project-tags span{padding:3px 9px;border-radius:6px;background:rgba(176,127,224,.08);color:var(--accent);font-size:10.5px;font-family:'JetBrains Mono',monospace;font-weight:500}

/* ── SKILLS ── */
.skills-section{margin-bottom:28px}
.skills-section h4{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;font-weight:500}
.skill-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.skill-label{font-size:13px;font-weight:500;width:140px;flex-shrink:0}
.skill-bar-bg{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.skill-bar{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.skill-pct{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;width:36px;text-align:right}

/* ── ABOUT / STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--bg3);border:1px solid rgba(176,127,224,.08);border-radius:var(--radius);padding:22px;text-align:center;transition:border-color .2s}
.stat-card:hover{border-color:var(--accent)}
.stat-number{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:12px;color:var(--text2);margin-top:6px}
.about-bio{font-size:14px;line-height:1.8;color:var(--text2);max-width:640px}
.about-bio strong{color:var(--text);font-weight:600}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--accent),var(--violet),var(--blue))}
.timeline-item{position:relative;margin-bottom:32px;animation:canvas-in .5s cubic-bezier(.22,1,.36,1)}
.timeline-dot{position:absolute;left:-32px;top:6px;width:22px;height:22px;border-radius:50%;background:var(--bg2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center}
.timeline-dot::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent)}
.timeline-item h4{font-size:15px;font-weight:600;margin-bottom:4px}
.timeline-item .t-role{font-size:13px;color:var(--accent);margin-bottom:4px;font-weight:500}
.timeline-item .t-date{font-size:12px;color:var(--text3);margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.timeline-item p{font-size:13px;color:var(--text2);line-height:1.7}

/* ── CONTACT ── */
.contact-cards{display:flex;flex-direction:column;gap:14px;max-width:440px}
.contact-card{background:var(--bg3);border:1px solid rgba(176,127,224,.08);border-radius:var(--radius);padding:18px 22px;display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--text);transition:all .2s}
.contact-card:hover{border-color:var(--accent);transform:translateX(4px)}
.contact-icon{width:42px;height:42px;border-radius:10px;background:rgba(176,127,224,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.contact-card .c-label{font-size:12px;color:var(--text3)}
.contact-card .c-value{font-size:14px;font-weight:500;margin-top:2px}

/* ── MOBILE ── */
@media(max-width:860px){
  .app{flex-direction:column}
  .chat-panel{width:100%;height:100vh;border-right:none}
  .canvas-panel{display:none}
  .inline-canvas{display:block!important;margin:8px 0 4px 40px;max-width:calc(100% - 50px)}
}
.inline-canvas{display:none}
.inline-project-cards{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.inline-project-cards .mini-card{padding:8px 12px;background:var(--bg);border:1px solid rgba(176,127,224,.15);border-radius:8px;font-size:11px;cursor:pointer;color:var(--text);transition:all .2s}
.inline-project-cards .mini-card:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <!-- CHAT PANEL -->

</div>

<script>
// ── DATA ──
const PROJECTS = [
  {id:1,name:"Supply Chain AI Dashboard",icon:"📊",tags:["Python","Streamlit","Claude API","Pandas"],desc:"Real-time supply chain analytics dashboard powered by Claude AI, providing intelligent insights on inventory, logistics, and demand forecasting for enterprise clients."},

  {id:9,name:"Alfred",icon:"🎙️",tags:["Voice AI","Conversational","Automation"],desc:"Personal voice AI assistant that handles scheduling, research, and task automation through natural conversational interaction."},
  {id:10,name:"HiveBrain",icon:"🧠",tags:["Node.js","Astro","SQLite","MCP"],desc:"Local-first knowledge base for developers with MCP integration, storing patterns, gotchas, and debug solutions for team-wide intelligence."},
  {id:11,name:"AI Social Media Manager",icon:"📣",tags:["Python","Ollama","Streamlit"],desc:"AI-powered social media content generator and scheduler using local LLMs via Ollama for privacy-focused content creation and management."},
  {id:12,name:"ScanSafe",icon:"🛡️",tags:["React","React Native","TypeScript"],desc:"Cross-platform safety scanning application built with React Native, providing real-time threat detection and compliance verification."},
  {id:13,name:"App Manager",icon:"⚙️",tags:["React","Vite","Express","Node.js"],desc:"Centralized application management dashboard for monitoring, deploying, and controlling multiple web services from a single interface."},
  {id:14,name:"Flair Music",icon:"🎵",tags:["React Native","Expo","Laravel","Spotify API"],desc:"Music discovery and playlist management app integrating Spotify API with social features, built with React Native and Laravel backend."},
  {id:15,name:"AI Professor",icon:"🎓",tags:["Claude API","React","Adaptive Learning"],desc:"Adaptive learning platform powered by Claude that personalizes educational content, tracks progress, and adjusts difficulty in real-time."}
];

const SKILLS = {
  "AI & LLMs":[
    {name:"Claude API / Anthropic",pct:95,color:"var(--accent)"},
    {name:"Prompt Engineering",pct:92,color:"var(--accent)"},
    {name:"RAG / Embeddings",pct:88,color:"var(--accent)"},
    {name:"Multi-Agent Systems",pct:90,color:"var(--accent)"},
    {name:"LangChain / LlamaIndex",pct:82,color:"var(--accent)"}
  ],
  "Backend & Data":[
    {name:"Python",pct:93,color:"var(--blue)"},
    {name:"Node.js / Express",pct:88,color:"var(--blue)"},
    {name:"FastAPI",pct:85,color:"var(--blue)"},
    {name:"SQL / SQLite",pct:87,color:"var(--blue)"},
    {name:"Laravel / PHP",pct:78,color:"var(--blue)"}
  ],
  "Frontend & Mobile":[
    {name:"React / Next.js",pct:90,color:"var(--violet)"},
    {name:"TypeScript",pct:86,color:"var(--violet)"},
    {name:"React Native / Expo",pct:82,color:"var(--violet)"},
    {name:"Streamlit",pct:88,color:"var(--violet)"},
    {name:"HTML / CSS",pct:92,color:"var(--violet)"}
  ]
};

const TIMELINE = [
  {company:"Flair Group",role:"Founder & Agentic AI Engineer",date:"2022 — Present",desc:"Founded Flair Group to deliver AI-powered solutions for enterprise clients. Built 50+ projects spanning supply chain, compliance, document processing, and multi-agent systems. Drove $780K+ in client savings through intelligent automation."},
  {company:"Enterprise AI Consulting",role:"Senior AI Developer",date:"2020 — 2022",desc:"Led AI integration projects for $400M+ enterprise clients, designing and deploying production LLM pipelines, RAG systems, and automated workflows that transformed business operations."},
  {company:"Full-Stack Development",role:"Software Engineer",date:"2018 — 2020",desc:"Built and shipped web and mobile applications using React, Node.js, and Laravel. Developed scalable APIs, real-time systems, and cross-platform mobile apps for diverse client needs."}
];

const CONTACT = [
  {icon:"📧",label:"Email",value:"merwan@flairgroup.dev",href:"mailto:merwan@flairgroup.dev"},
  {icon:"💼",label:"LinkedIn",value:"linkedin.com/in/merwandjerbi",href:"https://linkedin.com/in/merwandjerbi"},
  {icon:"🐙",label:"GitHub",value:"github.com/merwanito",href:"https://github.com/merwanito"},
  {icon:"🌐",label:"Website",value:"flairgroup.dev",href:"https://flairgroup.dev"}
];

// ── CHAT ENGINE ──
const messagesEl = document.getElementById('messages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const canvasBody = document.getElementById('canvasBody');
const canvasTitle = document.getElementById('canvasTitle');
let isBusy = false;

function scrollChat(){
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(text, sender, extra){
  const row = document.createElement('div');
  row.className = `msg-row ${sender}`;
  const avatarLetter = sender === 'ai' ? 'MD' : 'You';
  row.innerHTML = `<div class="msg-avatar">${sender==='ai'?'MD':'U'}</div><div class="msg-bubble">${text}${extra||''}</div>`;
  messagesEl.appendChild(row);
  scrollChat();
  return row;
}

function showTyping(){
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing';
  row.innerHTML = `<div class="msg-avatar">MD</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(row);
  scrollChat();
}

function hideTyping(){
  const t = document.getElementById('typing');
  if(t) t.remove();
}

function addQuickReplies(options){
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = o;
    btn.addEventListener('click', () => {
      wrap.remove();
      handleInput(o);
    });
    wrap.appendChild(btn);
  });
  messagesEl.appendChild(wrap);
  scrollChat();
}

function showCanvas(id, title){
  document.querySelectorAll('.canvas-view').forEach(v => v.classList.remove('active'));
  const view = document.getElementById('view-'+id);
  if(view){
    view.classList.remove('active');
    void view.offsetWidth; // force reflow
    view.classList.add('active');
  }
  canvasTitle.textContent = title || 'Canvas';
}

// ── RENDER CANVAS VIEWS ──
function renderProjects(){
  const grid = document.getElementById('projectGrid');
  if(grid.children.length) return;
  PROJECTS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.innerHTML = `<div class="project-icon">${p.icon}</div><h4>${p.name}</h4><p>${p.desc.slice(0,90)}...</p><div class="project-tags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>`;
    card.addEventListener('click', () => handleProjectClick(p));
    grid.appendChild(card);
  });
}

function renderSkills(){
  const view = document.getElementById('view-skills');
  if(view.children.length) return;
  Object.entries(SKILLS).forEach(([cat, skills]) => {
    const section = document.createElement('div');
    section.className = 'skills-section';
    section.innerHTML = `<h4>${cat}</h4>`;
    skills.forEach(s => {
      const row = document.createElement('div');
      row.className = 'skill-row';
      row.innerHTML = `<span class="skill-label">${s.name}</span><div class="skill-bar-bg"><div class="skill-bar" style="width:0%;background:${s.color}"></div></div><span class="skill-pct mono">${s.pct}%</span>`;
      section.appendChild(row);
      setTimeout(() => {
        row.querySelector('.skill-bar').style.width = s.pct + '%';
      }, 200);
    });
    view.appendChild(section);
  });
}

function renderAbout(){
  const view = document.getElementById('view-about');
  if(view.children.length) return;
  view.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">7+</div><div class="stat-label">Years Experience</div></div>
      <div class="stat-card"><div class="stat-number">50+</div><div class="stat-label">Projects Built</div></div>
      <div class="stat-card"><div class="stat-number">$780K+</div><div class="stat-label">Client Savings</div></div>
      <div class="stat-card"><div class="stat-number">5+</div><div class="stat-label">Enterprise Clients</div></div>
    </div>
    <div class="about-bio">
      <p><strong>Merwan T Djerbi</strong> is an Agentic AI Engineer and the founder of <strong>Flair Group</strong>. With 7+ years of experience spanning full-stack development, AI/ML engineering, and enterprise consulting, he specializes in building intelligent systems that automate complex workflows.</p>
      <br>
      <p>His work focuses on <strong>multi-agent AI architectures</strong>, RAG pipelines, and production LLM integrations for clients managing $400M+ in enterprise operations. From supply chain dashboards to voice assistants, Merwan builds AI that delivers measurable business impact — having driven <strong>$780K+ in documented savings</strong> for his clients.</p>
      <br>
      <p>He believes the future of software is <strong>agentic</strong>: AI that doesn't just respond, but acts, learns, and orchestrates. Every project he builds moves toward that vision.</p>
    </div>`;
}

function renderExperience(){
  const view = document.getElementById('view-experience');
  if(view.children.length) return;
  const tl = document.createElement('div');
  tl.className = 'timeline';
  TIMELINE.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'timeline-item';
    item.style.animationDelay = (i * 0.15) + 's';
    item.innerHTML = `<div class="timeline-dot"></div><h4>${t.company}</h4><div class="t-role">${t.role}</div><div class="t-date">${t.date}</div><p>${t.desc}</p>`;
    tl.appendChild(item);
  });
  view.appendChild(tl);
}

function renderContact(){
  const view = document.getElementById('view-contact');
  if(view.children.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'contact-cards';
  CONTACT.forEach(c => {
    wrap.innerHTML += `<a class="contact-card" href="${c.href}" target="_blank" rel="noopener"><div class="contact-icon">${c.icon}</div><div><div class="c-label">${c.label}</div><div class="c-value">${c.value}</div></div></a>`;
  });
  view.appendChild(wrap);
}

function renderProjectDetail(p){
  const view = document.getElementById('view-project-detail');
  view.innerHTML = `
    <div style="max-width:560px">
      <div style="font-size:48px;margin-bottom:16px">${p.icon}</div>
      <h2 style="font-size:24px;font-weight:700;margin-bottom:8px">${p.name}</h2>
      <div class="project-tags" style="margin-bottom:20px">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>
      <p style="font-size:14px;line-height:1.8;color:var(--text2)">${p.desc}</p>
    </div>`;
}

// ── HANDLE INPUT ──
function handleProjectClick(p){
  if(isBusy) return;
  isBusy = true;
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMessage(`Great choice! <strong>${p.name}</strong> is one of Merwan's standout projects. ${p.desc}`,'ai');
    addQuickReplies(['Projects','Skills','Experience','About','Contact']);
    renderProjectDetail(p);
    showCanvas('project-detail', p.name);
    isBusy = false;
  }, 800);
}

function handleInput(raw){
  if(isBusy) return;
  const text = raw.trim();
  if(!text) return;
  const lower = text.toLowerCase();

  // Show user message
  addMessage(text, 'user');
  isBusy = true;
  showTyping();

  let delay = 600 + Math.random() * 900;

  // Match intent
  if(lower.includes('project')){
    setTimeout(() => {
      hideTyping();
      addMessage("Here are <strong>15 projects</strong> Merwan has built. Click any card on the right to learn more! Each one represents real production work — from AI dashboards to multi-agent systems.",'ai');
      addQuickReplies(['Skills','Experience','About','Contact','Surprise me']);
      renderProjects();
      showCanvas('projects','Projects');
      isBusy = false;
    }, delay);
  }
  else if(lower.includes('skill')){
    setTimeout(() => {
      hideTyping();
      addMessage("Merwan's strongest areas are <strong>AI/LLMs</strong>, <strong>Python</strong>, and <strong>full-stack development</strong>. He's deeply experienced with Claude API, multi-agent architectures, RAG pipelines, and modern frontend frameworks.",'ai');
      addQuickReplies(['Projects','Experience','About','Contact']);
      renderSkills();
      showCanvas('skills','Skills & Expertise');
      isBusy = false;
    }, delay);
  }
  else if(lower.includes('about') || lower.includes('who') || lower.includes('bio')){
    setTimeout(() => {
      hideTyping();
      addMessage("Merwan T Djerbi is an <strong>Agentic AI Engineer</strong> and founder of <strong>Flair Group</strong>. With 7+ years of experience, he's built 50+ projects for enterprise clients managing $400M+ in operations — driving $780K+ in documented savings through AI automation.",'ai');
      addQuickReplies(['Projects','Skills','Experience','Contact']);
      renderAbout();
      showCanvas('about','About Merwan');
      isBusy = false;
    }, delay);
  }
  else if(lower.includes('experience') || lower.includes('career') || lower.includes('work') || lower.includes('timeline')){
    setTimeout(() => {
      hideTyping();
      addMessage("Here's Merwan's career journey — from full-stack development to founding <strong>Flair Group</strong> and specializing in agentic AI systems for enterprise clients.",'ai');
      addQuickReplies(['Projects','Skills','About','Contact']);
      renderExperience();
      showCanvas('experience','Career Timeline');
      isBusy = false;
    }, delay);
  }
  else if(lower.includes('contact') || lower.includes('email') || lower.includes('reach') || lower.includes('hire') || lower.includes('connect')){
    setTimeout(() => {
      hideTyping();
      addMessage("You can reach Merwan through any of these channels. He's always open to discussing AI projects, consulting opportunities, or just connecting!",'ai');
      addQuickReplies(['Projects','Skills','Experience','About']);
      renderContact();
      showCanvas('contact','Get in Touch');
      isBusy = false;
    }, delay);
  }
  else if(lower.includes('surprise') || lower.includes('random')){
    const p = PROJECTS[Math.floor(Math.random() * PROJECTS.length)];
    setTimeout(() => {
      hideTyping();
      addMessage(`How about this one? <strong>${p.name}</strong> — ${p.desc}`,'ai');
      addQuickReplies(['Surprise me','Projects','Skills','Experience','About','Contact']);
      renderProjectDetail(p);
      showCanvas('project-detail', p.name);
      isBusy = false;
    }, delay);
  }
  else if(lower.includes('hello') || lower.includes('hi') || lower.includes('hey')){
    setTimeout(() => {
      hideTyping();
      addMessage("Hey there! Great to have you here. I know everything about Merwan's work — from AI dashboards to multi-agent systems. What would you like to explore?",'ai');
      addQuickReplies(['Projects','Skills','Experience','About','Contact','Surprise me']);
      isBusy = false;
    }, delay);
  }
  else if(lower.includes('thank')){
    setTimeout(() => {
      hideTyping();
      addMessage("You're welcome! Let me know if there's anything else you'd like to know about Merwan's work.",'ai');
      addQuickReplies(['Projects','Skills','Experience','About','Contact']);
      isBusy = false;
    }, delay);
  }
  else {
    setTimeout(() => {
      hideTyping();
      addMessage("Interesting question! I'm best at telling you about Merwan's <strong>projects</strong>, <strong>skills</strong>, <strong>experience</strong>, and <strong>background</strong>. Try one of the quick replies below, or ask about something specific like \"What AI projects has he built?\" or \"Tell me about his skills.\"",'ai');
      addQuickReplies(['Projects','Skills','Experience','About','Contact','Surprise me']);
      isBusy = false;
    }, delay);
  }
}

// ── EVENT LISTENERS ──
sendBtn.addEventListener('click', () => {
  const val = chatInput.value.trim();
  if(val){
    chatInput.value = '';
    handleInput(val);
  }
});
chatInput.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const val = chatInput.value.trim();
    if(val){
      chatInput.value = '';
      handleInput(val);
    }
  }
});

// ── INIT: Send intro message ──
(function init(){
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMessage("Hey! I'm Merwan's AI portfolio assistant. I know everything about his work, skills, and projects. What would you like to explore?",'ai');
    addQuickReplies(['Projects','Skills','Experience','About','Contact','Surprise me']);
  }, 1200);
})();
</script>

<script>
function vsToggle(){document.getElementById('vs-panel').classList.toggle('vs-open');document.getElementById('vs-overlay').classList.toggle('vs-open')}
(function(){
var map={'index':'/',terminal:'/terminal',neural:'/neural',dashboard:'/dashboard',chat:'/chat'};
var fileMap={'/index.html':'index','/concept-terminal.html':'terminal','/concept-neural.html':'neural','/concept-dashboard.html':'dashboard','/concept-chat.html':'chat'};
var p=location.pathname;if(p==='/'||p==='/index.html')p='/';
var cur=fileMap[p]||(p.replace(/^\//,'').replace(/\/$/,'')||'index');
document.querySelectorAll('.vs-opt').forEach(function(a){if(a.dataset.vs===cur)a.classList.add('vs-active')});
document.querySelectorAll('.vs-opt').forEach(function(a){
a.addEventListener('click',function(e){
if(a.classList.contains('vs-active')){e.preventDefault();vsToggle();return}
e.preventDefault();
document.body.style.transition='opacity .3s';document.body.style.opacity='0';
setTimeout(function(){window.location.href=a.href},300);
});
});
})();
</script>
