<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merwan T Djerbi — Terminal Portfolio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0f'/><text x='16' y='22' font-family='monospace' font-weight='700' font-size='14' fill='%2300b8ff' text-anchor='middle'>MD</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --bg2:#111119;
  --border:#2a2a3a;
  --text:#e0e0ec;
  --dim:#6a6a80;
  --accent:#B07FE0;
  --blue:#00b8ff;
  --green:#22c55e;
  --yellow:#eab308;
  --red:#ef4444;
  --mono:'JetBrains Mono',monospace;
}
html,body{
  height:100%;
  background:var(--bg);
  font-family:var(--mono);
  color:var(--text);
  overflow:hidden;
}

/* --- Terminal Window --- */
.terminal-window{
  display:flex;
  flex-direction:column;
  height:calc(100vh - 64px);
  max-width:960px;
  margin:0 auto;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  background:var(--bg);
}

/* Title Bar */
.title-bar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 16px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  user-select:none;
  -webkit-user-select:none;
}
.dots{display:flex;gap:7px}
.dot{width:12px;height:12px;border-radius:50%}
.dot.r{background:var(--red)}
.dot.y{background:var(--yellow)}
.dot.g{background:var(--green)}
.title-bar-text{
  flex:1;
  text-align:center;
  font-size:12px;
  color:var(--dim);
  letter-spacing:0.5px;
}

/* Output Area */
.output{
  flex:1;
  overflow-y:auto;
  padding:16px;
  font-size:14px;
  line-height:1.6;
  scroll-behavior:smooth;
}
.output::-webkit-scrollbar{width:6px}
.output::-webkit-scrollbar-track{background:transparent}
.output::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Input Area */
.input-area{
  display:flex;
  align-items:center;
  padding:12px 16px;
  border-top:1px solid var(--border);
  background:var(--bg2);
  flex-shrink:0;
  gap:8px;
}
.prompt-label{
  color:var(--accent);
  white-space:nowrap;
  font-size:14px;
}
.prompt-label .user{color:var(--blue)}
.prompt-label .sep{color:var(--dim)}
.prompt-label .path{color:var(--accent)}
.prompt-label .dollar{color:var(--dim)}
#cmd-input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  font-family:var(--mono);
  font-size:14px;
  caret-color:var(--accent);
}

/* Command Chips */
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px 16px;
  border-top:1px solid var(--border);
  background:var(--bg2);
  flex-shrink:0;
}
.chip{
  padding:6px 14px;
  border:1px solid var(--border);
  border-radius:4px;
  background:transparent;
  color:var(--accent);
  font-family:var(--mono);
  font-size:12px;
  cursor:pointer;
  transition:all .15s;
  user-select:none;
  -webkit-user-select:none;
}
.chip:hover{
  background:rgba(176,127,224,.1);
  border-color:var(--accent);
}
.chip:active{
  transform:scale(0.96);
}

/* --- Syntax Colors --- */
.c-accent{color:var(--accent)}
.c-blue{color:var(--blue)}
.c-green{color:var(--green)}
.c-yellow{color:var(--yellow)}
.c-red{color:var(--red)}
.c-dim{color:var(--dim)}
.c-text{color:var(--text)}
.c-bold{font-weight:700}

/* Blinking Cursor */
.cursor{
  display:inline-block;
  width:8px;
  height:16px;
  background:var(--accent);
  vertical-align:text-bottom;
  animation:blink 1s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Progress Bar */
.progress-bar{
  display:inline-block;
  width:200px;
  background:var(--border);
  border-radius:2px;
  height:10px;
  overflow:hidden;
  vertical-align:middle;
}
.progress-fill{
  height:100%;
  border-radius:2px;
  transition:width .3s;
}

/* Projects Table */
.proj-table{
  border-collapse:collapse;
  width:100%;
  font-size:13px;
  margin:8px 0;
}
.proj-table th{
  text-align:left;
  color:var(--accent);
  border-bottom:1px solid var(--border);
  padding:4px 12px 4px 0;
  white-space:nowrap;
}
.proj-table td{
  padding:3px 12px 3px 0;
  white-space:nowrap;
}
.proj-table td:first-child{color:var(--blue)}
.proj-table td:nth-child(2){color:var(--dim);font-size:12px}
.proj-table td:nth-child(3){color:var(--green);font-size:12px}

/* Skills Section */
.skill-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin:2px 0;
  font-size:13px;
}
.skill-name{
  width:180px;
  flex-shrink:0;
  color:var(--text);
}
.skill-bar{
  flex:1;
  max-width:220px;
  height:8px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
}
.skill-fill{
  height:100%;
  border-radius:2px;
}
.skill-pct{
  width:36px;
  text-align:right;
  color:var(--dim);
  font-size:11px;
}

/* Easter egg */
@keyframes rainbow{
  0%{color:#ff0000}16%{color:#ff8800}33%{color:#ffff00}50%{color:#00ff00}66%{color:#0088ff}83%{color:#8800ff}100%{color:#ff0000}
}
.rainbow{animation:rainbow 1.5s linear infinite}

/* Responsive */
@media(max-width:640px){
  .output{padding:12px;font-size:13px}
  .input-area{padding:10px 12px}
  .chips{padding:8px 12px;gap:6px}
  .chip{padding:5px 10px;font-size:11px}
  .skill-name{width:140px}
  .proj-table{font-size:11px}
  .proj-table td,.proj-table th{padding:2px 6px 2px 0}
}
@media(max-width:400px){
  .prompt-label{font-size:12px}
  #cmd-input{font-size:13px}
  .skill-name{width:110px}
}
</style>
</head>
<body>

<div class="terminal-window">
  <div class="title-bar">
    <div class="dots">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
    </div>
    <div class="title-bar-text">merwan@portfolio &mdash; zsh &mdash; 80x24</div>
    <div style="width:54px"></div>
  </div>

  <div class="output" id="output"></div>

  <div class="input-area" id="input-area" style="display:none">
    <span class="prompt-label">
      <span class="user">merwan</span><span class="sep">@</span><span class="path">portfolio</span><span class="sep">:~</span><span class="dollar">$</span>
    </span>
    <input type="text" id="cmd-input" autocomplete="off" autocapitalize="off" spellcheck="false" autofocus>
  </div>

  <div class="chips" id="chips" style="display:none">
    <button class="chip" data-cmd="about">about</button>
    <button class="chip" data-cmd="projects">projects</button>
    <button class="chip" data-cmd="skills">skills</button>
    <button class="chip" data-cmd="experience">experience</button>
    <button class="chip" data-cmd="contact">contact</button>
    <button class="chip" data-cmd="help">help</button>
  </div>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const output = $('#output');
  const input = $('#cmd-input');
  const inputArea = $('#input-area');
  const chipsBar = $('#chips');
  let typing = false;
  let queue = [];

  // --- Utilities ---
  function scrollBottom(){
    output.scrollTop = output.scrollHeight;
  }

  function appendRaw(html){
    output.insertAdjacentHTML('beforeend', html);
    scrollBottom();
  }

  function appendLine(html){
    appendRaw(html + '\n');
  }

  // Type text with animation, supports HTML tags (prints them instantly)
  function typeText(text, speed = 20){
    return new Promise(resolve => {
      const span = document.createElement('span');
      output.appendChild(span);
      let i = 0;
      function tick(){
        if(i >= text.length){ scrollBottom(); resolve(); return; }
        // If we hit an HTML tag, dump it all at once
        if(text[i] === '<'){
          const close = text.indexOf('>', i);
          if(close !== -1){
            span.innerHTML += text.substring(i, close + 1);
            i = close + 1;
            tick();
            return;
          }
        }
        // Handle HTML entities like &amp;
        if(text[i] === '&'){
          const semi = text.indexOf(';', i);
          if(semi !== -1 && semi - i < 10){
            span.innerHTML += text.substring(i, semi + 1);
            i = semi + 1;
            scrollBottom();
            setTimeout(tick, speed);
            return;
          }
        }
        span.innerHTML += text[i];
        i++;
        scrollBottom();
        setTimeout(tick, speed);
      }
      tick();
    });
  }

  // Instant print
  function print(html){
    const div = document.createElement('div');
    div.innerHTML = html;
    output.appendChild(div);
    scrollBottom();
  }

  function printLines(lines){
    lines.forEach(l => print(l));
  }

  // Delay
  function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

  // --- Boot Sequence ---
  async function boot(){
    const ascii = `<span class="c-accent c-bold">
 __  __ ____
|  \\/  |  _ \\
| |\\/| | | | |
| |  | | |_| |
|_|  |_|____/
</span>`;
    appendRaw('<pre style="line-height:1.2">' + ascii + '</pre>');
    await wait(400);

    await typeText('<span class="c-dim">Merwan T Djerbi — Agentic AI Engineer</span>\n', 18);
    await wait(200);
    await typeText('<span class="c-dim">Initializing portfolio agent...</span>\n\n', 18);
    await wait(300);

    // Loading bars for skills
    const loads = [
      { name: 'AI & LLM Integration', color: 'var(--accent)', pct: 95 },
      { name: 'Full-Stack Dev',       color: 'var(--blue)',   pct: 90 },
      { name: 'Agentic Systems',      color: 'var(--green)',  pct: 92 },
      { name: 'System Architecture',  color: 'var(--yellow)', pct: 88 },
    ];

    for(const l of loads){
      const id = 'boot-' + l.name.replace(/\W/g,'');
      print(`<span class="c-dim">[LOAD]</span> ${l.name.padEnd(24)} <span class="progress-bar"><span class="progress-fill" id="${id}" style="width:0;background:${l.color}"></span></span>`);
      await wait(80);
      const el = document.getElementById(id);
      // Animate fill
      await new Promise(resolve => {
        let w = 0;
        const interval = setInterval(() => {
          w += 4;
          if(w >= l.pct){ w = l.pct; clearInterval(interval); resolve(); }
          el.style.width = w + '%';
        }, 15);
      });
      await wait(60);
    }

    print('');
    await typeText('<span class="c-green">&#10003; Portfolio agent ready.</span>\n', 15);
    await wait(200);
    await typeText('<span class="c-dim">Type </span><span class="c-accent">help</span><span class="c-dim"> or click a command below to begin.</span>\n\n', 15);

    // Show input and chips
    inputArea.style.display = 'flex';
    chipsBar.style.display = 'flex';
    input.focus();
  }

  // --- Commands ---
  const COMMANDS = {};

  COMMANDS.help = async function(){
    await typeText(`
<span class="c-accent c-bold">Available commands:</span>

  <span class="c-blue">about</span>        <span class="c-dim">—</span> Who is Merwan?
  <span class="c-blue">projects</span>     <span class="c-dim">—</span> Browse 15 projects
  <span class="c-blue">skills</span>       <span class="c-dim">—</span> Technical skill breakdown
  <span class="c-blue">experience</span>   <span class="c-dim">—</span> Professional timeline
  <span class="c-blue">contact</span>      <span class="c-dim">—</span> Get in touch
  <span class="c-blue">clear</span>        <span class="c-dim">—</span> Clear terminal
  <span class="c-blue">help</span>         <span class="c-dim">—</span> Show this message

  <span class="c-yellow">sudo hire merwan</span>  <span class="c-dim">—</span> <span class="c-dim">???</span>

`, 8);
  };

  COMMANDS.about = async function(){
    await typeText(`
<span class="c-accent c-bold">// ABOUT</span>

<span class="c-text">Merwan T Djerbi</span>
<span class="c-blue">Agentic AI Engineer & Founder</span>

<span class="c-dim">Founder of</span> <span class="c-accent">Flair Group</span><span class="c-dim">, a company building AI-powered</span>
<span class="c-dim">solutions for enterprise clients.</span>

<span class="c-dim">7+ years of experience in full-stack development,</span>
<span class="c-dim">AI/ML integration, and agentic system design.</span>

<span class="c-dim">Delivered solutions for clients generating</span>
<span class="c-accent">$400M+</span> <span class="c-dim">in annual revenue.</span>

<span class="c-dim">Specialty: designing autonomous AI agents that</span>
<span class="c-dim">handle complex workflows end-to-end — from</span>
<span class="c-dim">document processing to multi-step decision-making.</span>

`, 10);
  };

  COMMANDS.projects = async function(){
    const projects = [
      ['Supply Chain AI Dashboard',  'Python, Streamlit, Claude API',          'Enterprise'],
      ['NFC Equipment Compliance',   'Next.js, Drizzle, SQLite, NFC',         'Enterprise'],
      ['RAG Document Engine',        'LangChain, ChromaDB, FastAPI',          'Enterprise'],
      ['AI Invoice Processor',       'Claude Vision, Python, OCR',            'Enterprise'],
      ['Agentic Workflow Builder',   'React, Node.js, WebSocket',            'Platform'],
      ['AI Competitor Analysis',     'FastAPI, Claude Sonnet, SQLite',        'Business Intel'],
      ['Data Analyst Agent',         'Claude Code, Sub-Agent, Analytics',     'AI Agent'],
      ['LLM Council',               'Python, React, OpenRouter',             'AI Innovation'],
      ['Alfred',                     'Voice AI, Conversational, Automation',  'AI Agent'],
      ['HiveBrain',                  'Node.js, Astro, SQLite, MCP',          'Dev Tools'],
      ['AI Social Media Manager',    'Python, Ollama, Streamlit',            'Marketing'],
      ['ScanSafe',                   'React, React Native, TypeScript',      'Consumer App'],
      ['App Manager',                'React, Vite, Express, Node.js',        'Internal Tools'],
      ['Flair Music',                'React Native, Expo, Laravel, Spotify', 'Consumer App'],
      ['AI Professor',               'Claude API, React, Adaptive Learning', 'Education'],
    ];

    print('<span class="c-accent c-bold">// PROJECTS</span>');
    print('');

    let table = '<table class="proj-table"><tr><th>NAME</th><th>STACK</th><th>TYPE</th></tr>';
    projects.forEach(p => {
      table += `<tr><td>${p[0]}</td><td>${p[1]}</td><td>${p[2]}</td></tr>`;
    });
    table += '</table>';

    // Type the header row then instant-print rows for readability
    await wait(100);
    print(table);
    print(`\n<span class="c-dim">${projects.length} projects loaded.</span>\n`);
  };

  COMMANDS.skills = async function(){
    const categories = [
      {
        title: 'AI & LLM',
        skills: [
          ['Claude API / Sonnet / Opus', 95, 'var(--accent)'],
          ['Prompt Engineering',         92, 'var(--accent)'],
          ['RAG / Vector DBs',           88, 'var(--accent)'],
          ['Agentic Workflows',          94, 'var(--accent)'],
          ['LangChain / LlamaIndex',     85, 'var(--accent)'],
        ]
      },
      {
        title: 'Backend',
        skills: [
          ['Python / FastAPI',    92, 'var(--blue)'],
          ['Node.js / Express',   90, 'var(--blue)'],
          ['SQL / SQLite / Drizzle', 88, 'var(--blue)'],
          ['REST & WebSocket APIs', 90, 'var(--blue)'],
        ]
      },
      {
        title: 'Frontend',
        skills: [
          ['React / Next.js',       90, 'var(--green)'],
          ['React Native / Expo',   85, 'var(--green)'],
          ['TypeScript',            88, 'var(--green)'],
          ['Tailwind / CSS',        87, 'var(--green)'],
        ]
      },
      {
        title: 'DevOps & Tools',
        skills: [
          ['Git / GitHub Actions',  90, 'var(--yellow)'],
          ['Docker / Deployment',   82, 'var(--yellow)'],
          ['MCP / Tool Integration',88, 'var(--yellow)'],
          ['Claude Code / Cursor',  95, 'var(--yellow)'],
        ]
      },
    ];

    print('<span class="c-accent c-bold">// SKILLS</span>\n');

    for(const cat of categories){
      print(`<span class="c-dim">--- ${cat.title} ---</span>`);
      for(const [name, pct, color] of cat.skills){
        const filled = Math.round(pct / 5);
        const empty = 20 - filled;
        const bar = `<span style="color:${color}">${'█'.repeat(filled)}</span><span class="c-dim">${'░'.repeat(empty)}</span>`;
        print(`<div class="skill-row"><span class="skill-name">${name}</span>${bar} <span class="c-dim">${pct}%</span></div>`);
        await wait(40);
      }
      print('');
    }
  };

  COMMANDS.experience = async function(){
    await typeText(`
<span class="c-accent c-bold">// EXPERIENCE</span>

<span class="c-blue">2023 — Present</span>  <span class="c-text c-bold">Founder & Lead AI Engineer</span>
                   <span class="c-accent">Flair Group</span>
                   <span class="c-dim">Building AI-powered solutions for enterprise clients.</span>
                   <span class="c-dim">Agentic systems, RAG pipelines, full-stack apps.</span>
                   <span class="c-dim">Clients generating $400M+ in annual revenue.</span>

<span class="c-blue">2021 — 2023</span>     <span class="c-text c-bold">Full-Stack Developer & AI Integration</span>
                   <span class="c-accent">Freelance / Contract</span>
                   <span class="c-dim">React, Node.js, Python. First forays into LLM</span>
                   <span class="c-dim">integration and automation tooling.</span>

<span class="c-blue">2019 — 2021</span>     <span class="c-text c-bold">Software Developer</span>
                   <span class="c-accent">Various Projects</span>
                   <span class="c-dim">Web & mobile development. React Native apps,</span>
                   <span class="c-dim">REST APIs, database design.</span>

`, 8);
  };

  COMMANDS.contact = async function(){
    await typeText(`
<span class="c-accent c-bold">// CONTACT</span>

  <span class="c-blue">Email</span>      <span class="c-text">merwan@flairgroup.io</span>
  <span class="c-blue">LinkedIn</span>   <span class="c-text">linkedin.com/in/merwandjerbi</span>
  <span class="c-blue">GitHub</span>     <span class="c-text">github.com/merwanDjerworki</span>
  <span class="c-blue">Web</span>        <span class="c-text">flairgroup.io</span>

<span class="c-dim">Open to enterprise AI projects and consulting.</span>

`, 12);
  };

  COMMANDS.clear = async function(){
    output.innerHTML = '';
  };

  COMMANDS['sudo hire merwan'] = async function(){
    print('');
    print('<span class="c-green">[sudo] password for recruiter: ********</span>');
    await wait(600);
    print('<span class="c-dim">Verifying credentials...</span>');
    await wait(500);
    print('<span class="c-green">Access granted.</span>');
    await wait(400);
    print('');

    const frames = [
      '╔══════════════════════════════════════════╗',
      '║                                          ║',
      '║   <span class="rainbow c-bold">  CONGRATULATIONS! YOU DID IT!  </span>   ║',
      '║                                          ║',
      '║   <span class="c-accent">Merwan has been successfully hired.</span>  ║',
      '║                                          ║',
      '║   <span class="c-blue">Starting in: 3... 2... 1... NOW!</span>     ║',
      '║                                          ║',
      '╚══════════════════════════════════════════╝',
    ];

    for(const line of frames){
      print(`<span class="c-green">${line}</span>`);
      await wait(80);
    }

    await wait(500);

    // Confetti-like characters
    const confetti = '🎉 🚀 ✨ 🎯 💼 🎊 ⚡ 🏆';
    print('');
    print(`<span style="font-size:20px;letter-spacing:8px">${confetti}</span>`);
    print('');
    await wait(300);
    print('<span class="c-dim">Just kidding... but seriously, let\'s talk!</span>');
    print('<span class="c-dim">Email: </span><span class="c-accent">merwan@flairgroup.io</span>');
    print('');
  };

  // Aliases
  COMMANDS['ls projects'] = COMMANDS.projects;

  // --- Command Execution ---
  async function execute(raw){
    const cmd = raw.trim().toLowerCase();
    if(!cmd) return;

    // Echo the command
    print(`<span class="c-accent">merwan</span><span class="c-dim">@</span><span class="c-accent">portfolio</span><span class="c-dim">:~$</span> <span class="c-text">${escapeHtml(raw.trim())}</span>`);

    if(COMMANDS[cmd]){
      typing = true;
      await COMMANDS[cmd]();
      typing = false;
    } else {
      print(`<span class="c-red">zsh: command not found: ${escapeHtml(cmd)}</span>`);
      print(`<span class="c-dim">Type </span><span class="c-accent">help</span><span class="c-dim"> to see available commands.</span>\n`);
    }
  }

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // --- Event Listeners ---
  input.addEventListener('keydown', async function(e){
    if(e.key === 'Enter' && !typing){
      const val = input.value;
      input.value = '';
      await execute(val);
    }
  });

  // Chip clicks
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', async function(){
      if(typing) return;
      const cmd = this.dataset.cmd;
      input.value = '';
      await execute(cmd);
      input.focus();
    });
  });

  // Click anywhere to focus input
  output.addEventListener('click', () => {
    if(inputArea.style.display !== 'none') input.focus();
  });

  // --- Start ---
  boot();

})();
</script>

<!-- View Switcher -->

<style>

<script>
(function(){
var p=location.pathname.split('/').pop()||'index.html';
var fileMap={'index.html':'index','concept-terminal.html':'terminal','concept-neural.html':'neural','concept-dashboard.html':'dashboard'};
var cur=fileMap[p]||'index';
document.querySelectorAll('.vs-tab').forEach(function(a){
if(a.dataset.vs===cur)a.classList.add('vs-active');
a.addEventListener('click',function(e){
if(a.classList.contains('vs-active')){e.preventDefault();return}
e.preventDefault();
document.body.style.transition='opacity .3s';document.body.style.opacity='0';
setTimeout(function(){window.location.href=a.href},300);
});
});
})();
