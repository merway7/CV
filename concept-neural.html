<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merwan T Djerbi — Neural Network Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Sora', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
  }

  /* ---- Header ---- */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(10,10,15,0.92) 0%, rgba(10,10,15,0) 100%);
  }
  #header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #fff;
    text-transform: uppercase;
  }
  #header h1 span {
    color: #B07FE0;
  }
  #header p {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #888;
    margin-top: 4px;
  }

  /* ---- Legend ---- */
  #legend {
    position: fixed;
    bottom: 24px; left: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 16px 20px;
    border-radius: 12px;
    background: rgba(10,10,15,0.85);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    pointer-events: none;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 400;
    color: #aaa;
    letter-spacing: 1px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ---- Tooltip ---- */
  #tooltip {
    position: fixed;
    z-index: 20;
    padding: 8px 14px;
    border-radius: 8px;
    background: rgba(20,20,30,0.92);
    border: 1px solid rgba(176,127,224,0.3);
    backdrop-filter: blur(8px);
    font-size: 13px;
    font-weight: 400;
    color: #e0e0e0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  #tooltip.visible { opacity: 1; }

  /* ---- Detail Panel ---- */
  #detail-panel {
    position: fixed;
    top: 0; right: 0;
    width: 380px;
    max-width: 90vw;
    height: 100vh;
    z-index: 15;
    background: rgba(12,12,20,0.96);
    border-left: 1px solid rgba(176,127,224,0.15);
    backdrop-filter: blur(20px);
    padding: 80px 28px 28px;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
  }
  #detail-panel.open { transform: translateX(0); }
  #detail-panel .close-btn {
    position: absolute;
    top: 24px; right: 24px;
    width: 32px; height: 32px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    color: #888;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  #detail-panel .close-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
  #detail-panel .node-type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  #detail-panel h2 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
    line-height: 1.3;
  }
  #detail-panel .description {
    font-size: 14px;
    line-height: 1.7;
    color: #aaa;
    margin-bottom: 20px;
  }
  #detail-panel .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  #detail-panel .tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 400;
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
  }
  #detail-panel .connections-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 10px;
  }
  #detail-panel .connection-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    transition: color 0.15s;
  }
  #detail-panel .connection-item:hover { color: #fff; }
  #detail-panel .connection-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
  }

  /* ---- Mobile ---- */
  @media (max-width: 640px) {
    #header h1 { font-size: 16px; letter-spacing: 2px; }
    #header p { font-size: 10px; }
    #detail-panel { width: 100vw; max-width: 100vw; padding-top: 60px; }
    #legend { bottom: 12px; left: 12px; padding: 10px 14px; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="header">
  <div>
    <h1>MERWAN <span>T</span> DJERBI</h1>
    <p>Agentic AI Engineer</p>
  </div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#B07FE0;box-shadow:0 0 6px #B07FE0"></div>Projects</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00b8ff;box-shadow:0 0 6px #00b8ff"></div>Skills</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7b61ff;box-shadow:0 0 6px #7b61ff"></div>Categories</div>
</div>

<div id="tooltip"></div>

<div id="detail-panel">
  <button class="close-btn" onclick="closePanel()">&times;</button>
  <div id="panel-content"></div>
</div>

<script>
// =================================================================
//  DATA
// =================================================================
const COLORS = {
  project:  '#B07FE0',
  skill:    '#00b8ff',
  category: '#7b61ff',
};

const projectDescriptions = {
  'Supply Chain AI Dashboard': 'End-to-end AI-powered dashboard for supply chain analytics, forecasting, and anomaly detection across logistics pipelines.',
  'NFC Equipment Compliance': 'NFC-based equipment compliance tracking system that automates safety inspections and regulatory reporting.',
  'RAG Document Engine': 'Retrieval-Augmented Generation engine for intelligent document search, summarization, and Q&A over enterprise knowledge bases.',
  'AI Invoice Processor': 'Automated invoice extraction and classification system using vision models and structured data pipelines.',
  'Agentic Workflow Builder': 'Visual builder for constructing multi-agent workflows with tool use, memory, and human-in-the-loop capabilities.',
  'AI Competitor Analysis': 'AI agent that continuously monitors competitors, extracts insights, and generates strategic intelligence reports.',
  'Data Analyst Agent': 'Autonomous data analysis agent that ingests datasets, generates hypotheses, runs statistical tests, and produces reports.',
  'LLM Council': 'Multi-LLM deliberation framework where multiple models debate, critique, and converge on high-quality outputs.',
  'Alfred': 'Personal AI butler agent for task management, scheduling, and intelligent automation of daily workflows.',
  'HiveBrain': 'Local-first knowledge base capturing patterns, gotchas, and debug solutions for accelerated development.',
  'AI Social Media Manager': 'AI agent that crafts, schedules, and optimizes social media content across platforms with brand-consistent voice.',
  'ScanSafe': 'Document scanning and safety verification system with OCR and automated compliance checks.',
  'App Manager': 'Centralized application lifecycle manager for deploying, monitoring, and scaling multi-service architectures.',
  'Flair Music': 'AI-powered music recommendation and playlist generation platform with mood-aware curation.',
  'AI Professor': 'Adaptive tutoring AI that personalizes lesson plans, generates exercises, and provides Socratic feedback.',
};

const projectTech = {
  'Supply Chain AI Dashboard': ['Python', 'React', 'FastAPI', 'SQLite'],
  'NFC Equipment Compliance':  ['React', 'Node.js', 'SQLite'],
  'RAG Document Engine':       ['Python', 'LangChain', 'FastAPI', 'Claude API'],
  'AI Invoice Processor':      ['Python', 'Claude API', 'FastAPI'],
  'Agentic Workflow Builder':  ['Python', 'React', 'Claude API', 'LangChain'],
  'AI Competitor Analysis':    ['Python', 'Claude API', 'LangChain'],
  'Data Analyst Agent':        ['Python', 'Claude API', 'SQLite'],
  'LLM Council':               ['Python', 'Claude API', 'LangChain'],
  'Alfred':                    ['Python', 'Claude API', 'FastAPI'],
  'HiveBrain':                 ['TypeScript', 'Node.js', 'SQLite'],
  'AI Social Media Manager':   ['Python', 'Claude API', 'Next.js'],
  'ScanSafe':                  ['React', 'Node.js', 'TypeScript'],
  'App Manager':               ['Next.js', 'TypeScript', 'Node.js'],
  'Flair Music':               ['React', 'Node.js', 'Python'],
  'AI Professor':              ['Python', 'Claude API', 'React'],
};

const projectCategories = {
  'Supply Chain AI Dashboard': 'Enterprise',
  'NFC Equipment Compliance':  'Enterprise',
  'RAG Document Engine':       'AI Agent',
  'AI Invoice Processor':      'Enterprise',
  'Agentic Workflow Builder':  'Dev Tools',
  'AI Competitor Analysis':    'AI Agent',
  'Data Analyst Agent':        'AI Agent',
  'LLM Council':               'AI Agent',
  'Alfred':                    'Consumer',
  'HiveBrain':                 'Dev Tools',
  'AI Social Media Manager':   'AI Agent',
  'ScanSafe':                  'Enterprise',
  'App Manager':               'Dev Tools',
  'Flair Music':               'Consumer',
  'AI Professor':              'Consumer',
};

// Build nodes
const nodes = [];
const edges = [];
const nodeMap = {};

function addNode(name, type) {
  if (nodeMap[name]) return nodeMap[name];
  const n = {
    id: nodes.length,
    name,
    type,
    x: 0, y: 0,
    vx: 0, vy: 0,
    radius: type === 'project' ? 18 : type === 'category' ? 22 : 12,
    color: COLORS[type],
    pulsePhase: Math.random() * Math.PI * 2,
  };
  nodeMap[name] = n;
  nodes.push(n);
  return n;
}

// Categories
['Enterprise', 'AI Agent', 'Dev Tools', 'Consumer'].forEach(c => addNode(c, 'category'));

// Skills
['Python', 'React', 'Node.js', 'Claude API', 'FastAPI', 'Next.js', 'TypeScript', 'SQLite', 'LangChain'].forEach(s => addNode(s, 'skill'));

// Projects + edges
Object.keys(projectDescriptions).forEach(p => {
  const pn = addNode(p, 'project');
  // Connect to skills
  (projectTech[p] || []).forEach(s => {
    const sn = addNode(s, 'skill');
    edges.push({ source: pn.id, target: sn.id });
  });
  // Connect to category
  const cat = projectCategories[p];
  if (cat) {
    const cn = addNode(cat, 'category');
    edges.push({ source: pn.id, target: cn.id });
  }
});

// Adjacency lookup
const adjacency = new Map();
nodes.forEach(n => adjacency.set(n.id, new Set()));
edges.forEach(e => {
  adjacency.get(e.source).add(e.target);
  adjacency.get(e.target).add(e.source);
});

// =================================================================
//  CANVAS SETUP
// =================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Initial positions - spread in a circle with some randomness
nodes.forEach((n, i) => {
  const angle = (i / nodes.length) * Math.PI * 2;
  const r = Math.min(W, H) * 0.3 + (Math.random() - 0.5) * 100;
  n.x = W / 2 + Math.cos(angle) * r;
  n.y = H / 2 + Math.sin(angle) * r;
});

// =================================================================
//  PARTICLES ON EDGES
// =================================================================
const particles = [];
const MAX_PARTICLES = 120;

function spawnParticle() {
  if (particles.length >= MAX_PARTICLES) return;
  const e = edges[Math.floor(Math.random() * edges.length)];
  particles.push({
    edge: e,
    t: 0,
    speed: 0.003 + Math.random() * 0.005,
    size: 1 + Math.random() * 1.5,
    alpha: 0.4 + Math.random() * 0.4,
  });
}

// Pre-spawn
for (let i = 0; i < 60; i++) {
  spawnParticle();
  particles[particles.length - 1].t = Math.random();
}

// =================================================================
//  PHYSICS
// =================================================================
const REPULSION = 4000;
const SPRING_K = 0.004;
const SPRING_REST = 140;
const DAMPING = 0.88;
const CENTER_PULL = 0.0002;

function simulate() {
  const n = nodes.length;

  // Repulsion between all pairs
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = REPULSION / (dist * dist);
      let fx = (dx / dist) * force, fy = (dy / dist) * force;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }

  // Spring forces along edges
  edges.forEach(e => {
    const a = nodes[e.source], b = nodes[e.target];
    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
    let displacement = dist - SPRING_REST;
    let force = SPRING_K * displacement;
    let fx = (dx / dist) * force, fy = (dy / dist) * force;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });

  // Center pull
  nodes.forEach(n => {
    n.vx += (W / 2 - n.x) * CENTER_PULL;
    n.vy += (H / 2 - n.y) * CENTER_PULL;
  });

  // Integrate
  nodes.forEach(n => {
    if (n === dragNode) return;
    n.vx *= DAMPING;
    n.vy *= DAMPING;
    n.x += n.vx;
    n.y += n.vy;
    // Boundary
    const margin = 60;
    if (n.x < margin) { n.x = margin; n.vx *= -0.5; }
    if (n.x > W - margin) { n.x = W - margin; n.vx *= -0.5; }
    if (n.y < margin) { n.y = margin; n.vy *= -0.5; }
    if (n.y > H - margin) { n.y = H - margin; n.vy *= -0.5; }
  });
}

// =================================================================
//  RENDERING
// =================================================================
let hoveredNode = null;
let selectedNode = null;
let time = 0;

function drawEdge(a, b, alpha) {
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = `rgba(255,255,255,${0.04 * alpha})`;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawNode(n, alpha, t) {
  const pulse = 1 + 0.06 * Math.sin(t * 2 + n.pulsePhase);
  const r = n.radius * pulse;
  const isHovered = n === hoveredNode;
  const isSelected = n === selectedNode;
  const highlight = isHovered || isSelected;

  // Glow
  const glowAlpha = (highlight ? 0.35 : 0.12) * alpha;
  const grad = ctx.createRadialGradient(n.x, n.y, r * 0.5, n.x, n.y, r * 3);
  grad.addColorStop(0, hexToRGBA(n.color, glowAlpha));
  grad.addColorStop(1, hexToRGBA(n.color, 0));
  ctx.beginPath();
  ctx.arc(n.x, n.y, r * 3, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Body
  ctx.beginPath();
  ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
  ctx.fillStyle = hexToRGBA(n.color, (highlight ? 1 : 0.7) * alpha);
  ctx.fill();

  // Border ring
  if (highlight) {
    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 3, 0, Math.PI * 2);
    ctx.strokeStyle = hexToRGBA(n.color, 0.6 * alpha);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Label
  const fontSize = n.type === 'category' ? 11 : n.type === 'project' ? 10 : 9;
  ctx.font = `${highlight ? 600 : 400} ${fontSize}px Sora`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = `rgba(255,255,255,${(highlight ? 0.95 : 0.55) * alpha})`;
  ctx.fillText(n.name, n.x, n.y + r + 6);
}

function hexToRGBA(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function render() {
  time += 0.016;

  ctx.clearRect(0, 0, W, H);

  // Faint background grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  const spacing = 40;
  for (let x = spacing; x < W; x += spacing) {
    for (let y = spacing; y < H; y += spacing) {
      ctx.fillRect(x, y, 1, 1);
    }
  }

  // Determine alpha for dimming
  const hasHighlight = hoveredNode || selectedNode;
  const highlightId = (hoveredNode || selectedNode || {}).id;
  const connectedIds = hasHighlight ? adjacency.get(highlightId) : null;

  // Draw edges
  edges.forEach(e => {
    const a = nodes[e.source], b = nodes[e.target];
    let alpha = 1;
    if (hasHighlight) {
      const connected = (e.source === highlightId || e.target === highlightId);
      alpha = connected ? 3 : 0.15;
    }
    drawEdge(a, b, alpha);
  });

  // Draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += p.speed;
    if (p.t > 1) { particles.splice(i, 1); continue; }
    const a = nodes[p.edge.source], b = nodes[p.edge.target];
    const px = a.x + (b.x - a.x) * p.t;
    const py = a.y + (b.y - a.y) * p.t;
    let pAlpha = p.alpha;
    if (hasHighlight) {
      const connected = (p.edge.source === highlightId || p.edge.target === highlightId);
      pAlpha *= connected ? 1.5 : 0.1;
    }
    // Fade in/out at ends
    pAlpha *= Math.min(p.t * 5, (1 - p.t) * 5, 1);
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${pAlpha})`;
    ctx.fill();
  }

  // Spawn new particles
  if (Math.random() < 0.3) spawnParticle();

  // Draw nodes
  nodes.forEach(n => {
    let alpha = 1;
    if (hasHighlight) {
      if (n.id === highlightId || (connectedIds && connectedIds.has(n.id))) {
        alpha = 1;
      } else {
        alpha = 0.12;
      }
    }
    drawNode(n, alpha, time);
  });

  simulate();
  requestAnimationFrame(render);
}

// =================================================================
//  INTERACTION
// =================================================================
let dragNode = null;
let isDragging = false;
let mouseX = 0, mouseY = 0;
const tooltip = document.getElementById('tooltip');

function getNodeAt(x, y) {
  // Reverse to pick top-drawn nodes first
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = n.x - x, dy = n.y - y;
    const hitR = n.radius + 10;
    if (dx * dx + dy * dy < hitR * hitR) return n;
  }
  return null;
}

function showTooltip(n, cx, cy) {
  tooltip.textContent = n.name;
  tooltip.classList.add('visible');
  const tw = tooltip.offsetWidth;
  tooltip.style.left = Math.min(cx + 14, W - tw - 10) + 'px';
  tooltip.style.top = (cy - 36) + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// Mouse events
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  if (dragNode) {
    dragNode.x = mouseX;
    dragNode.y = mouseY;
    dragNode.vx = 0;
    dragNode.vy = 0;
    return;
  }

  const n = getNodeAt(mouseX, mouseY);
  hoveredNode = n;
  canvas.style.cursor = n ? 'pointer' : 'default';

  if (n) {
    showTooltip(n, mouseX, mouseY);
  } else {
    hideTooltip();
  }
});

canvas.addEventListener('mousedown', e => {
  const n = getNodeAt(e.clientX, e.clientY);
  if (n) {
    dragNode = n;
    isDragging = false;
  }
});

canvas.addEventListener('mousemove', e => {
  if (dragNode) isDragging = true;
});

canvas.addEventListener('mouseup', e => {
  if (dragNode && !isDragging) {
    selectNode(dragNode);
  }
  dragNode = null;
  isDragging = false;
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  hideTooltip();
});

// Touch events
let touchStartNode = null;
let touchMoved = false;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const n = getNodeAt(t.clientX, t.clientY);
  touchStartNode = n;
  touchMoved = false;
  if (n) {
    dragNode = n;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchMoved = true;
  const t = e.touches[0];
  if (dragNode) {
    dragNode.x = t.clientX;
    dragNode.y = t.clientY;
    dragNode.vx = 0;
    dragNode.vy = 0;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (touchStartNode && !touchMoved) {
    selectNode(touchStartNode);
  }
  dragNode = null;
  touchStartNode = null;
  touchMoved = false;
});

// =================================================================
//  DETAIL PANEL
// =================================================================
const panel = document.getElementById('detail-panel');
const panelContent = document.getElementById('panel-content');

function selectNode(n) {
  if (selectedNode === n) {
    closePanel();
    return;
  }
  selectedNode = n;

  const connected = [...adjacency.get(n.id)].map(id => nodes[id]);
  const typeLabel = n.type.charAt(0).toUpperCase() + n.type.slice(1);
  const badgeColor = n.color;

  let html = `<div class="node-type-badge" style="background:${hexToRGBA(badgeColor, 0.15)};color:${badgeColor};border:1px solid ${hexToRGBA(badgeColor, 0.3)}">${typeLabel}</div>`;
  html += `<h2>${n.name}</h2>`;

  if (n.type === 'project') {
    html += `<p class="description">${projectDescriptions[n.name] || ''}</p>`;
    const techs = projectTech[n.name] || [];
    const cat = projectCategories[n.name];
    const tags = [...techs];
    if (cat) tags.push(cat);
    html += `<div class="tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
  } else if (n.type === 'skill') {
    const usedBy = Object.keys(projectTech).filter(p => projectTech[p].includes(n.name));
    html += `<p class="description">Used in ${usedBy.length} project${usedBy.length !== 1 ? 's' : ''} across the portfolio.</p>`;
    html += `<div class="tags">${usedBy.map(p => `<span class="tag">${p}</span>`).join('')}</div>`;
  } else if (n.type === 'category') {
    const inCat = Object.keys(projectCategories).filter(p => projectCategories[p] === n.name);
    html += `<p class="description">${inCat.length} project${inCat.length !== 1 ? 's' : ''} in this category.</p>`;
  }

  if (connected.length > 0) {
    html += `<div class="connections-title">Connections</div>`;
    connected.forEach(c => {
      html += `<div class="connection-item" onclick="selectNodeById(${c.id})"><span class="connection-dot" style="background:${c.color}"></span>${c.name}</div>`;
    });
  }

  panelContent.innerHTML = html;
  panel.classList.add('open');
}

function selectNodeById(id) {
  selectNode(nodes[id]);
}

function closePanel() {
  panel.classList.remove('open');
  selectedNode = null;
}

// Close panel on click outside
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

// =================================================================
//  START
// =================================================================
render();
</script>
