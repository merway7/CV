<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Breaker — Merwan's Games</title>
<meta name="description" content="CodeBreaker — a code-themed puzzle game by Merwan T Djerbi. Crack the pattern using logic and deduction.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://merwandjerbi.com/game-codebreaker.html">
<meta property="og:title" content="Code Breaker — Merwan's Games">
<meta property="og:description" content="CodeBreaker — a code-themed puzzle game by Merwan T Djerbi. Crack the pattern using logic and deduction.">

<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111119;
  --bg3: #1a1a25;
  --surface: #16161f;
  --border: #2a2a3a;
  --text: #e0e0ec;
  --text2: #9898b2;
  --accent: #B07FE0;
  --accent2: #00b8ff;
  --accent3: #7b61ff;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Sora', sans-serif;
  --green: #538d4e;
  --yellow: #b59f3b;
  --gray: #3a3a4a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 100px;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.back-link {
  position: absolute;
  top: 18px;
  left: 20px;
  font-size: 13px;
  color: var(--text2);
  font-family: var(--mono);
}
.back-link:hover { color: var(--accent); text-decoration: none; }
header {
  text-align: center;
  padding: 32px 16px 16px;
}
header h1 {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
header p {
  color: var(--text2);
  font-size: 13px;
  margin-top: 4px;
}
#board {
  display: grid;
  grid-template-rows: repeat(6, 1fr);
  gap: 6px;
  margin: 16px auto;
}
.row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.tile {
  width: 56px;
  height: 56px;
  border: 2px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text);
  background: var(--surface);
  transition: transform 0.1s;
}
.tile.filled {
  border-color: var(--text2);
  animation: pop 0.1s ease;
}
.tile.flip {
  animation: flip 0.5s ease forwards;
}
.tile.correct { background: var(--green); border-color: var(--green); }
.tile.present { background: var(--yellow); border-color: var(--yellow); }
.tile.absent { background: var(--gray); border-color: var(--gray); }
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}
@keyframes flip {
  0% { transform: scaleY(1); }
  50% { transform: scaleY(0); }
  100% { transform: scaleY(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-4px); }
  40%, 80% { transform: translateX(4px); }
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-16px); }
}
#keyboard {
  margin: 8px auto 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}
.kb-row { display: flex; gap: 5px; }
.key {
  height: 50px;
  min-width: 36px;
  padding: 0 8px;
  border: none;
  border-radius: 6px;
  background: var(--bg3);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.key:active { transform: scale(0.95); }
.key.wide { min-width: 56px; font-size: 12px; }
.key.correct { background: var(--green); color: #fff; }
.key.present { background: var(--yellow); color: #fff; }
.key.absent { background: #2a2a30; color: #555; }
#toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 999;
}
#toast.show { opacity: 1; }
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 998;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px;
  text-align: center;
  max-width: 340px;
  width: 90%;
}
.modal h2 {
  font-family: var(--mono);
  font-size: 22px;
  margin-bottom: 8px;
}
.modal .word-reveal {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--accent2);
  margin-bottom: 16px;
}
.modal .stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}
.modal .stat-val {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
}
.modal .stat-label {
  font-size: 11px;
  color: var(--text2);
}
.modal button {
  background: linear-gradient(135deg, var(--accent3), var(--accent));
  color: #fff;
  border: none;
  padding: 12px 28px;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin: 4px;
  transition: opacity 0.2s;
}
.modal button:hover { opacity: 0.85; }
.modal button.secondary {
  background: var(--bg3);
  color: var(--text2);
}
@media (max-width: 480px) {
  .tile { width: 48px; height: 48px; font-size: 18px; }
  .key { height: 44px; min-width: 28px; font-size: 12px; padding: 0 5px; }
  .key.wide { min-width: 44px; font-size: 10px; }
  header h1 { font-size: 22px; letter-spacing: 2px; }
}
:focus-visible{outline:2px solid var(--accent2,#00b8ff);outline-offset:3px;border-radius:3px}
</style>

<body>
<a class="back-link" href="games.html">&larr; Games</a>
<header>
  <h1>CODE BREAKER</h1>
  <p>Crack the 5-letter tech keyword</p>
</header>
<div id="board"></div>
<div id="keyboard"></div>
<div id="toast"></div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">You Win!</h2>
    <div class="word-reveal" id="modal-word"></div>
    <div class="stats">
      <div><div class="stat-val" id="stat-played">0</div><div class="stat-label">Played</div></div>
      <div><div class="stat-val" id="stat-win">0</div><div class="stat-label">Win %</div></div>
      <div><div class="stat-val" id="stat-streak">0</div><div class="stat-label">Streak</div></div>
    </div>
    <button id="share-btn">Share</button>
    <button class="secondary" id="close-modal-btn">Close</button>
  </div>
</div>
<script>
(function() {
  var WORDS = [
    'react','torch','flask','agent','chain','query','stack','debug','pixel','parse',
    'array','class','float','input','print','while','break','catch','throw','yield',
    'async','await','fetch','route','state','props','redux','hooks','event','scope',
    'types','model','numpy','regex','shell','linux','swift','build','cache','mutex'
  ];
  var MAX_GUESSES = 6;
  var WORD_LEN = 5;

  function seedRandom(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  var todaySeed = seedRandom(new Date().toDateString());
  var TARGET = WORDS[todaySeed % WORDS.length];

  var currentRow = 0;
  var currentCol = 0;
  var currentGuess = '';
  var gameOver = false;
  var guesses = [];
  var keyStates = {};

  // Build board
  var board = document.getElementById('board');
  for (var r = 0; r < MAX_GUESSES; r++) {
    var row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-' + r;
    for (var c = 0; c < WORD_LEN; c++) {
      var tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = 'tile-' + r + '-' + c;
      row.appendChild(tile);
    }
    board.appendChild(row);
  }

  // Build keyboard
  var KB_ROWS = [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['enter','z','x','c','v','b','n','m','del']
  ];
  var keyboard = document.getElementById('keyboard');
  KB_ROWS.forEach(function(keys) {
    var row = document.createElement('div');
    row.className = 'kb-row';
    keys.forEach(function(k) {
      var btn = document.createElement('button');
      btn.className = 'key' + (k === 'enter' || k === 'del' ? ' wide' : '');
      btn.textContent = k === 'del' ? '⌫' : k;
      btn.dataset.key = k;
      btn.addEventListener('click', function() { handleKey(k); });
      row.appendChild(btn);
    });
    keyboard.appendChild(row);
  });

  // Physical keyboard
  document.addEventListener('keydown', function(e) {
    if (gameOver) return;
    if (e.key === 'Enter') handleKey('enter');
    else if (e.key === 'Backspace') handleKey('del');
    else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toLowerCase());
  });

  function handleKey(key) {
    if (gameOver) return;
    if (key === 'del') {
      if (currentCol > 0) {
        currentCol--;
        currentGuess = currentGuess.slice(0, -1);
        var tile = document.getElementById('tile-' + currentRow + '-' + currentCol);
        tile.textContent = '';
        tile.classList.remove('filled');
      }
    } else if (key === 'enter') {
      if (currentGuess.length < WORD_LEN) {
        shakeRow(currentRow);
        showToast('Not enough letters');
        return;
      }
      submitGuess();
    } else if (currentCol < WORD_LEN) {
      var tile = document.getElementById('tile-' + currentRow + '-' + currentCol);
      tile.textContent = key;
      tile.classList.add('filled');
      currentGuess += key;
      currentCol++;
    }
  }

  function submitGuess() {
    var guess = currentGuess;
    var results = evaluateGuess(guess);
    guesses.push({ word: guess, results: results });

    // Flip tiles with staggered delay
    for (var i = 0; i < WORD_LEN; i++) {
      (function(idx) {
        var tile = document.getElementById('tile-' + currentRow + '-' + idx);
        setTimeout(function() {
          tile.classList.add('flip');
          setTimeout(function() {
            if (results[idx] === 'correct') tile.classList.add('correct');
            else if (results[idx] === 'present') tile.classList.add('present');
            else tile.classList.add('absent');
          }, 250);
        }, idx * 120);
      })(i);
    }

    // Update keyboard after all flips
    setTimeout(function() {
      for (var i = 0; i < WORD_LEN; i++) {
        var letter = guess[i];
        var result = results[i];
        var prev = keyStates[letter];
        if (result === 'correct') keyStates[letter] = 'correct';
        else if (result === 'present' && prev !== 'correct') keyStates[letter] = 'present';
        else if (!prev) keyStates[letter] = 'absent';
      }
      updateKeyboard();

      if (guess === TARGET) {
        gameOver = true;
        bounceRow(currentRow - 1);
        setTimeout(function() { showModal(true); }, 800);
      } else if (currentRow >= MAX_GUESSES) {
        gameOver = true;
        setTimeout(function() { showModal(false); }, 600);
      }
    }, WORD_LEN * 120 + 300);

    currentRow++;
    currentCol = 0;
    currentGuess = '';
  }

  function evaluateGuess(guess) {
    var results = new Array(WORD_LEN).fill('absent');
    var targetArr = TARGET.split('');
    var guessArr = guess.split('');

    // First pass: correct positions
    for (var i = 0; i < WORD_LEN; i++) {
      if (guessArr[i] === targetArr[i]) {
        results[i] = 'correct';
        targetArr[i] = null;
        guessArr[i] = null;
      }
    }
    // Second pass: present but wrong position
    for (var i = 0; i < WORD_LEN; i++) {
      if (guessArr[i] === null) continue;
      var idx = targetArr.indexOf(guessArr[i]);
      if (idx !== -1) {
        results[i] = 'present';
        targetArr[idx] = null;
      }
    }
    return results;
  }

  function updateKeyboard() {
    document.querySelectorAll('.key').forEach(function(btn) {
      var k = btn.dataset.key;
      if (keyStates[k]) {
        btn.classList.remove('correct', 'present', 'absent');
        btn.classList.add(keyStates[k]);
      }
    });
  }

  function shakeRow(row) {
    var el = document.getElementById('row-' + row);
    el.style.animation = 'shake 0.4s';
    setTimeout(function() { el.style.animation = ''; }, 400);
  }

  function bounceRow(row) {
    var el = document.getElementById('row-' + row);
    for (var i = 0; i < WORD_LEN; i++) {
      (function(idx) {
        var tile = el.children[idx];
        setTimeout(function() {
          tile.style.animation = 'bounce 0.5s ease';
          setTimeout(function() { tile.style.animation = ''; }, 500);
        }, idx * 80);
      })(i);
    }
  }

  function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 1500);
  }

  // Stats
  function loadStats() {
    try { return JSON.parse(localStorage.getItem('cb-stats')) || { played: 0, wins: 0, streak: 0 }; }
    catch(e) { return { played: 0, wins: 0, streak: 0 }; }
  }
  function saveStats(s) { localStorage.setItem('cb-stats', JSON.stringify(s)); }

  function showModal(won) {
    var stats = loadStats();
    stats.played++;
    if (won) { stats.wins++; stats.streak++; }
    else { stats.streak = 0; }
    saveStats(stats);

    document.getElementById('modal-title').textContent = won ? 'You Win!' : 'Game Over';
    document.getElementById('modal-word').textContent = TARGET.toUpperCase();
    document.getElementById('stat-played').textContent = stats.played;
    document.getElementById('stat-win').textContent = stats.played ? Math.round(stats.wins / stats.played * 100) : 0;
    document.getElementById('stat-streak').textContent = stats.streak;
    document.getElementById('modal-overlay').classList.add('show');
  }

  document.getElementById('close-modal-btn').addEventListener('click', function() {
    document.getElementById('modal-overlay').classList.remove('show');
  });

  document.getElementById('share-btn').addEventListener('click', function() {
    var emojiMap = { correct: '🟩', present: '🟨', absent: '⬛' };
    var lines = ['Code Breaker — ' + guesses.length + '/' + MAX_GUESSES];
    guesses.forEach(function(g) {
      lines.push(g.results.map(function(r) { return emojiMap[r]; }).join(''));
    });
    var text = lines.join('\n');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { showToast('Copied to clipboard!'); });
    } else {
      showToast('Share not supported');
    }
  });
})();
</script>

<script src="view-switcher.js"></script>
</body>
